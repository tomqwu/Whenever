<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whenever — flexible-trip best-value finder</title>
<style>
:root{color-scheme:light;--accent:#d4843d;--accent2:#c9742e;--ink:#1c1c1a;--mut:#6b6b66;--line:#e7e7e2;--bg:#fafaf8;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
.wrap{max-width:1120px;margin:0 auto;padding:22px 20px 80px}
.brand{display:flex;align-items:baseline;gap:10px;margin-bottom:2px}
.brand h1{font-size:24px;margin:0;letter-spacing:-.02em}
.brand .em{font-size:22px}
.tag{color:var(--mut);margin-bottom:18px}
.status{font-size:12px;color:var(--mut);margin-bottom:16px}
.status b{color:#2f7d32}
.status .warn{color:#b94a48}
.panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px}
.row{display:flex;flex-wrap:wrap;gap:16px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8a8a83}
input,select{padding:8px 10px;border:1px solid #d4d4cc;border-radius:8px;font-size:14px;background:#fff}
input[type=number]{width:80px}
button{cursor:pointer;border:1px solid var(--accent2);background:var(--accent);color:#fff;padding:9px 16px;border-radius:9px;font-size:14px;font-weight:600}
button.sec{background:#fff;color:var(--mut);border-color:#d4d4cc}
button:disabled{opacity:.5;cursor:default}
.suggest{position:absolute;top:100%;left:0;right:0;z-index:30;margin:2px 0 0;padding:4px;list-style:none;background:#fff;border:1px solid #d4d4cc;border-radius:9px;box-shadow:0 6px 20px rgba(0,0,0,.10);max-height:280px;overflow-y:auto;min-width:220px}
.suggest li{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:baseline;gap:6px;white-space:nowrap}
.suggest li .smeta{color:#8a8a83;font-size:11.5px}
.suggest li.active,.suggest li:hover{background:#fcefe2}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid #d4d4cc;border-radius:20px;padding:5px 11px;font-size:13px;cursor:pointer;background:#fff;user-select:none}
.chip.on{background:#fcefe2;border-color:var(--accent);color:#8a4b16;font-weight:600}
.kids{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.kids input{width:58px}
.hint{font-size:12px;color:var(--mut)}
.bar{height:6px;background:#ece9e2;border-radius:4px;overflow:hidden;margin:14px 0}
.bar>div{height:100%;width:0;background:var(--accent);transition:width .2s}
.rec{background:#fff7ef;border:1px solid #f0d9bf;border-radius:12px;padding:14px 16px;margin-bottom:20px;white-space:pre-wrap}
.rec h3{margin:0 0 6px;font-size:14px;color:#8a4b16;text-transform:uppercase;letter-spacing:.04em}
.summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:22px}
.card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 14px}
.card .city{font-weight:600}
.card .price{font-size:20px;font-weight:700;margin:3px 0}
.card .meta{font-size:11.5px;color:var(--mut)}
.cityblock{margin-bottom:26px}
.cityblock h2{font-size:15px;margin:0 0 8px}
.cityblock h2 small{font-weight:400;color:#8a8a83;font-size:12px}
table{border-collapse:collapse;width:100%;background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
th,td{padding:7px 8px;text-align:center;border:1px solid #eeede7;font-size:12.5px}
th{background:#f4f1ea;color:#4a4a44;font-weight:600}
td.rowh{background:#f4f1ea;font-weight:600}
td a.price{display:block;font-weight:700;color:#1456b0;text-decoration:none}
td a.price:hover{text-decoration:underline}
.stops{font-size:10.5px;color:#8a8a83}
.ns{font-size:11px;margin-top:2px}
td.pick-ns{background:#e9f3e9}
td.pick-ns .ns{color:#2f7d32;font-weight:600}
td.best{outline:2px solid var(--accent);outline-offset:-2px}
td.err{color:#b94a48;font-size:11px}
.foot{font-size:12px;color:var(--mut);margin-top:6px}
.estimate-flag{display:inline-block;font-size:11px;background:#fff3cd;border:1px solid #f0e0a0;color:#7a5b00;border-radius:5px;padding:1px 7px;margin-left:8px}
button.watch{margin-top:8px;padding:4px 10px;font-size:12px;font-weight:600;background:#fff;color:#8a4b16;border-color:var(--accent)}
button.watch.watched{background:#e9f3e9;color:#2f7d32;border-color:#bcdcbc;cursor:default}
.watched-panel h3{margin:0 0 8px;font-size:14px;color:#8a4b16;text-transform:uppercase;letter-spacing:.04em}
.watched-list{display:flex;flex-direction:column;gap:6px}
.watched-item{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:7px 11px;background:#fff;font-size:13px}
.watched-item .trip{flex:1}
.watched-item .wprice{font-weight:700;color:#1456b0}
.watched-item button.rm{padding:2px 9px;font-size:13px;background:#fff;color:#b94a48;border-color:#e0c4c4}
.watched-empty{font-size:12px;color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="em">✈️</span><h1>Whenever</h1></div>
  <div class="tag">No fixed dates? That's your advantage. Tell us roughly — we'll find exactly.</div>
  <div class="status" id="status">Checking local model…</div>

  <div class="panel">
    <div class="row">
      <div class="field">
        <label>Departure city</label>
        <input id="depCity" placeholder="e.g. Toronto" value="Toronto">
      </div>
      <div class="field">
        <label>Airport</label>
        <input id="depCode" placeholder="YYZ" value="YYZ" style="width:90px">
      </div>
      <div class="field" style="position:relative">
        <label>Destination (country or city)</label>
        <input id="country" placeholder="Type a country or city…" value="China"
               autocomplete="off" role="combobox" aria-autocomplete="list"
               aria-expanded="false" aria-controls="suggestList">
        <ul id="suggestList" class="suggest" role="listbox" style="display:none"></ul>
      </div>
      <div class="field" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <button class="sec" id="loadCities">Get top cities →</button>
      </div>
    </div>
    <div class="chips" id="cities"></div>

    <div class="row" style="margin-top:16px">
      <div class="field"><label>Adults</label><input id="adults" type="number" min="1" value="2"></div>
      <div class="field">
        <label>Children (ages)</label>
        <div class="kids" id="kids"></div>
      </div>
      <div class="field"><label>Families (×)</label><input id="families" type="number" min="1" value="3"></div>
    </div>

    <div class="row" style="margin-top:16px">
      <div class="field"><label>Earliest departure</label><input id="depStart" type="date" value="2026-12-12"></div>
      <div class="field"><label># departure days</label><input id="depSpan" type="number" min="1" max="10" value="2"></div>
      <div class="field"><label>Earliest return</label><input id="retStart" type="date" value="2027-01-04"></div>
      <div class="field"><label># return days</label><input id="retSpan" type="number" min="1" max="10" value="2"></div>
      <div class="field"><label>Nonstop premium OK (%)</label><input id="thresh" type="number" value="25"></div>
    </div>

    <div class="row" style="margin-top:16px;align-items:center">
      <button id="run">Find best value</button>
      <button id="exportPdf" class="sec" disabled>&#8203;&#11015; PDF</button>
      <button id="exportCsv" class="sec" disabled>&#8203;&#11015; CSV</button>
      <button id="copyLink" class="sec" disabled>&#128279; Copy link</button>
      <span class="hint" id="runHint"></span>
    </div>
  </div>

  <div class="bar"><div id="prog"></div></div>
  <div class="rec" id="rec" style="display:none"></div>
  <div class="summary" id="summary"></div>
  <div id="grids"></div>
  <div class="foot" id="foot"></div>

  <div class="panel watched-panel" id="watchedPanel" style="margin-top:24px">
    <h3>Watched trips</h3>
    <div class="watched-list" id="watchedList"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let CITIES = [];   // [{city,iata,on}]
let LAST = null;
let LAST_PAYLOAD = null;  // last submitted search payload, used by export buttons
let SHARE_SNAPSHOT = null;  // immutable share state captured at search start, written to the URL hash on `done`

function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
}
function money(v){ return v==null?'—':'$'+Math.round(v).toLocaleString('en-CA'); }
// fmtDuration: total minutes -> "14h 35m" (or "—" when null/unknown). Numeric input,
// formatted client-side; no string interpolation of untrusted data.
function fmtDuration(min){
  if (min == null) return '—';
  const h = Math.floor(min / 60), m = min % 60;
  return h + 'h ' + m + 'm';
}

// escapeHtml: HTML-escape a value so no untrusted string (from the server,
// the model, or a URL-derived share hash) can reach the DOM as live markup.
// Escapes & < > " ' — the five chars that matter inside element text and
// double/single-quoted attributes. Coerces non-strings to string first.
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// mdInline: safely render basic markdown from model output into HTML.
// 1. HTML-escape first (XSS safety) so no raw tags from model can execute.
// 2. Convert **bold** to <strong>bold</strong>.
// 3. Convert newlines to <br>.
// 4. Strip any leftover stray **.
function mdInline(s) {
  if (!s) return '';
  // Step 1: HTML-escape (shared helper — see escapeHtml above / #34)
  const esc = escapeHtml(s);
  // Step 2: **bold** → <strong>bold</strong>
  const bolded = esc.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Step 3: newlines → <br>
  const lined = bolded.replace(/\n/g, '<br>');
  // Step 4: strip leftover stray **
  return lined.replace(/\*\*/g, '');
}

// passengers: kid age inputs
function renderKids(ages){
  const box = $('#kids'); box.innerHTML='';
  (ages||[11,9]).forEach(a=>{
    const i=document.createElement('input'); i.type='number'; i.min=0; i.max=17; i.value=a; box.appendChild(i);
  });
  const add=document.createElement('button'); add.className='sec'; add.textContent='+'; add.style.padding='4px 9px';
  add.onclick=()=>{ const i=document.createElement('input'); i.type='number'; i.min=0;i.max=17;i.value=8; box.insertBefore(i,add); };
  const rem=document.createElement('button'); rem.className='sec'; rem.textContent='−'; rem.style.padding='4px 9px';
  rem.onclick=()=>{ const ins=box.querySelectorAll('input'); if(ins.length) ins[ins.length-1].remove(); };
  box.appendChild(add); box.appendChild(rem);
}
function kidAges(){ return [...$('#kids').querySelectorAll('input')].map(i=>parseInt(i.value)||0); }

async function health(){
  try{
    const h = await (await fetch('/api/health')).json();
    const s=$('#status');
    const prov = (h.providers||[]);
    let modelPart = h.ollama
      ? `Local model <b>${escapeHtml(h.model)}</b> connected (analyzes results)`
      : `<span class="warn">Ollama not reachable</span> — run <code>ollama serve</code> &amp; pull <b>${escapeHtml(h.model)}</b>`;
    let farePart = prov.length
      ? `flight data: <b>${escapeHtml(prov.join(', '))}</b>`
      : `<span class="warn">no flight API configured</span> — set TRAVELPAYOUTS_TOKEN or Amadeus keys to fetch real prices`;
    s.innerHTML = modelPart + ' · ' + farePart;
  }catch(e){ $('#status').innerHTML='<span class="warn">Backend not reachable.</span>'; }
}

// --------------------------- destination autocomplete (#55) ---------------------------
// A debounced type-ahead over GET /api/suggest. Picking a COUNTRY REPLACES the
// chip set with that country's seed-first top_cities expansion (same flow as the
// old "Get top cities" button). Picking a CITY APPENDS just that city as a chip
// (on:true), supporting MULTIPLE city selections and mixing with a country set.
let SUGGESTIONS = [];   // current suggestion list from /api/suggest
let SUGG_ACTIVE = -1;   // index of keyboard-highlighted suggestion (-1 = none)
let SUGG_TIMER = null;  // debounce timer handle
let SUGGEST_SEQ = 0;    // monotonic request token — a response is applied only if
                        // it carries the latest token (stale responses are dropped)
let EXPAND_SEQ = 0;     // monotonic token for /api/top-cities expansions — single-
                        // flight guard so only the LATEST expansion applies its chips

// expandCountry: run the seed-first /api/top-cities expansion and REPLACE CITIES
// with that country's set, every chip UNCHECKED (on:false) regardless of the
// `optional` flag. A country expansion no longer pre-selects anything, so it
// can't auto-run a huge search — the user explicitly opts in to the cities they
// want by clicking chips. (A directly-picked CITY via addCity() stays on:true.)
// Single-flight guarded: a slow expansion (e.g. a non-seed country via the LLM)
// that resolves AFTER the user picked another country is dropped, so the slower
// response can't apply last and show chips for the wrong country. (codex review)
async function expandCountry(country){
  if(!country) return;
  const seq = ++EXPAND_SEQ;   // this expansion's token (latest wins)
  try{
    const r = await (await fetch('/api/top-cities',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({country, n:6})})).json();
    if(seq !== EXPAND_SEQ) return;   // a newer expansion superseded us — drop this
    CITIES = (r.cities||[]).map(c=>({...c,on:false}));
    drawChips();
  }catch(e){ if(seq === EXPAND_SEQ) alert('Could not load cities: '+e); }
}

// Fallback "Get top cities →" button: expands whatever country is typed. The
// type-ahead covers this too (picking a country suggestion), but the explicit
// button stays as a discoverable affordance for a known country name.
$('#loadCities').onclick = async ()=>{
  const country = $('#country').value.trim(); if(!country) return;
  $('#loadCities').disabled=true; $('#loadCities').textContent='Asking model…';
  await expandCountry(country);
  $('#loadCities').disabled=false; $('#loadCities').textContent='Get top cities →';
};

// addCity: SELECT one city chip. If the city already exists (e.g. a country
// expansion rendered it on:false), turn that existing chip ON instead of
// returning a no-op — otherwise picking it from autocomplete would be ignored
// and Run would still have no selected destination. Otherwise APPEND it
// (on:true). Dedup by IATA, case-insensitive.
function addCity(city, iata){
  if(!iata) return;
  const existing = CITIES.find(c=>c.iata.toLowerCase()===iata.toLowerCase());
  if(existing){
    existing.on = true;   // select the already-present chip (codex review)
    ++EXPAND_SEQ;         // invalidate any in-flight expansion, as below
    drawChips();
    return;
  }
  // Invalidate any in-flight country expansion: bumping the token makes its
  // seq === EXPAND_SEQ guard fail, so a slow /api/top-cities response that
  // resolves after this pick can no longer REPLACE CITIES and delete the chip
  // the user just added. A direct chip-set mutation outside an expansion must
  // win over an expansion that was already in flight. (codex review)
  ++EXPAND_SEQ;
  CITIES.push({city: city||iata, iata, on:true});
  drawChips();
}

const sList = $('#suggestList');
const sInput = $('#country');

function closeSuggest(){
  // Cancel any pending debounce timer so a queued fetchSuggest() can't fire AFTER
  // we close. Without this, a timer scheduled before the close would still run,
  // mint a FRESH token (++SUGGEST_SEQ inside fetchSuggest), pass stale() while the
  // input still matches + is focused, and REOPEN the dropdown right after Escape/
  // clear/blur/pick. (codex review)
  if(SUGG_TIMER){ clearTimeout(SUGG_TIMER); SUGG_TIMER = null; }
  // Bump the request token so any /api/suggest response still in flight when we
  // close (Escape, clear, blur, outside-click, or a pick) is treated as stale and
  // dropped — a slow OLD response can no longer reopen this dropdown.
  SUGGEST_SEQ++;
  SUGGESTIONS = []; SUGG_ACTIVE = -1;
  sList.style.display='none'; sList.innerHTML='';
  sInput.setAttribute('aria-expanded','false');
}

// renderSuggest: paint the dropdown from SUGGESTIONS. All values escapeHtml'd so
// a crafted country/city name can never reach the DOM as live markup (#34 rule).
function renderSuggest(){
  if(!SUGGESTIONS.length){ closeSuggest(); return; }
  sList.innerHTML = SUGGESTIONS.map((s,i)=>{
    const active = i===SUGG_ACTIVE ? ' active' : '';
    let label, meta;
    if(s.type==='country'){
      label = escapeHtml(s.name);
      meta = 'country';
    } else {
      label = escapeHtml(s.city) + ' (' + escapeHtml(s.iata) + ')';
      meta = escapeHtml(s.country);
    }
    return '<li class="'+active.trim()+'" role="option" data-i="'+i+'">'+
      '<span>'+label+'</span><span class="smeta">· '+escapeHtml(meta)+'</span></li>';
  }).join('');
  sList.style.display='block';
  sInput.setAttribute('aria-expanded','true');
  sList.querySelectorAll('li').forEach(li=>{
    // mousedown (not click) so selection fires before the input's blur closes us.
    li.addEventListener('mousedown', ev=>{ ev.preventDefault(); pickSuggestion(parseInt(li.dataset.i)); });
  });
}

// pickSuggestion: act on the chosen suggestion — country expands (replace), city appends.
function pickSuggestion(i){
  const s = SUGGESTIONS[i];
  if(!s) return;
  if(s.type==='country'){
    sInput.value = s.name;
    expandCountry(s.name);
  } else {
    addCity(s.city, s.iata);
    // Leave the input cleared so the user can keep adding more cities.
    sInput.value = '';
  }
  closeSuggest();
}

async function fetchSuggest(q){
  // Capture this request's token. We only apply the response if it is STILL the
  // latest request, the query still matches the live input, and the field still
  // has focus — otherwise the user has typed on, cleared, Escaped, or tabbed away
  // and this (possibly slow) response is stale: drop it silently.
  const seq = ++SUGGEST_SEQ;
  const stale = () => seq !== SUGGEST_SEQ
    || q !== sInput.value.trim()
    || document.activeElement !== sInput;
  try{
    const r = await fetch('/api/suggest?q='+encodeURIComponent(q));
    if(stale()) return;               // ignore late response for an abandoned query
    if(!r.ok){ closeSuggest(); return; }
    const data = await r.json();
    if(stale()) return;               // re-check after the JSON body resolves too
    SUGGESTIONS = data.suggestions || [];
    SUGG_ACTIVE = -1;
    renderSuggest();
  }catch(e){ if(!stale()) closeSuggest(); }
}

sInput.addEventListener('input', ()=>{
  const q = sInput.value.trim();
  if(SUGG_TIMER) clearTimeout(SUGG_TIMER);
  if(!q){ closeSuggest(); return; }
  SUGG_TIMER = setTimeout(()=>fetchSuggest(q), 200);  // ~200ms debounce
});

sInput.addEventListener('keydown', ev=>{
  // Escape must ALWAYS cancel a pending debounce/request, even when the dropdown
  // is still hidden (user pressed Escape inside the 200ms debounce, before the
  // suggestion list opened). Without this, the early return below skips
  // closeSuggest(), the queued SUGG_TIMER survives, and the delayed /api/suggest
  // reopens suggestions AFTER the user already dismissed. (codex review)
  if(ev.key==='Escape'){ closeSuggest(); return; }
  if(sList.style.display==='none') return;
  if(ev.key==='ArrowDown'){
    ev.preventDefault();
    SUGG_ACTIVE = Math.min(SUGG_ACTIVE+1, SUGGESTIONS.length-1);
    renderSuggest();
  } else if(ev.key==='ArrowUp'){
    ev.preventDefault();
    SUGG_ACTIVE = Math.max(SUGG_ACTIVE-1, 0);
    renderSuggest();
  } else if(ev.key==='Enter'){
    if(SUGG_ACTIVE>=0){ ev.preventDefault(); pickSuggestion(SUGG_ACTIVE); }
  }
});

// Close on blur (slight delay so a mousedown pick can complete) and outside-click.
sInput.addEventListener('blur', ()=>{ setTimeout(closeSuggest, 120); });
document.addEventListener('click', ev=>{
  if(ev.target!==sInput && !sList.contains(ev.target)) closeSuggest();
});

function drawChips(){
  const box=$('#cities'); box.innerHTML='';
  CITIES.forEach((c,i)=>{
    const el=document.createElement('span'); el.className='chip'+(c.on?' on':'');
    el.textContent = `${c.city} (${c.iata})`;
    el.onclick=()=>{ CITIES[i].on=!CITIES[i].on; drawChips(); };
    box.appendChild(el);
  });
  if(CITIES.length){
    const hint=document.createElement('span'); hint.className='hint'; hint.textContent='click to toggle';
    box.appendChild(hint);
  }
}

$('#depCity').addEventListener('change', async ()=>{
  const city=$('#depCity').value.trim(); if(!city) return;
  try{ const r=await (await fetch('/api/resolve',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({city})})).json(); if(r.iata) $('#depCode').value=r.iata; }catch(e){}
});

function _cellHtml(c, thr) {
  const key = escapeHtml(c.dep + '|' + c.ret);
  if (c.cheapest_cad == null) return '<td class="err" data-k="' + key + '">n/a</td>';
  const pickNS = c.nonstop_cad && c.cheapest_cad && c.nonstop_cad <= c.cheapest_cad * thr;
  const cls = pickNS ? 'pick-ns' : '';
  const stopsTxt = (c.stops != null ? c.stops + ' stop' + (c.stops === 1 ? '' : 's') : '');
  const durTxt = (c.duration_min != null ? fmtDuration(c.duration_min) : '');
  const stopsDur = [stopsTxt, durTxt].filter(Boolean).join(' · ');
  let inner = '<a class="price" href="' + escapeHtml(c.book) + '" target="_blank" rel="noopener">' + money(c.cheapest_cad) + '</a>' +
    '<div class="stops">' + stopsDur + '</div>';
  if (c.nonstop_cad) {
    // nonstop line: pairs nonstop_cad with its OWN duration (nonstop = 0 stops).
    const nsDur = (c.nonstop_duration_min != null ? fmtDuration(c.nonstop_duration_min) : '');
    inner += '<div class="ns">ns ' + money(c.nonstop_cad) + (nsDur ? ' · ' + nsDur : '') + '</div>';
  }
  return '<td class="' + cls + '" data-k="' + key + '">' + inner + '</td>';
}

const CONFIRM_CELLS = 40;  // soft threshold: show a confirm() dialog above this cell count

$('#run').onclick = async () => {
  const dests = CITIES.filter(c => c.on).map(c => ({ city: c.city, iata: c.iata }));
  if (!dests.length) { alert('Pick at least one destination city (use "Get top cities").'); return; }
  const depSpan = parseInt($('#depSpan').value) || 2;
  const retSpan = parseInt($('#retSpan').value) || 2;
  const cells = dests.length * depSpan * retSpan;
  if (cells > CONFIRM_CELLS) {
    const ok = confirm(
      `This runs ~${cells} searches (${dests.length} cities \xd7 ${depSpan}\xd7${retSpan} dates),` +
      ` one provider call each — this can use a lot of your flight-API quota. Continue?`
    );
    if (!ok) return;
  }
  const thr = 1 + (parseFloat($('#thresh').value) || 25) / 100;
  const fams = parseInt($('#families').value) || 1;
  const payload = {
    origin: $('#depCode').value.trim().toUpperCase(),
    destinations: dests,
    adults: parseInt($('#adults').value) || 1,
    child_ages: kidAges(),
    families: fams,
    dep_start: $('#depStart').value, dep_span: parseInt($('#depSpan').value) || 2,
    ret_start: $('#retStart').value, ret_span: parseInt($('#retSpan').value) || 2,
    nonstop_threshold: parseFloat($('#thresh').value) || 25,
  };
  // Snapshot the share state NOW, at search start, from the current DOM/CITIES.
  // The results being streamed correspond to this submitted request, so the
  // Copy-link hash must encode this exact state even if the user edits the form
  // or toggles chips mid-stream. Written to the URL hash on `done` (never re-read).
  SHARE_SNAPSHOT = {
    depCity: $('#depCity').value.trim(),
    depCode: $('#depCode').value.trim().toUpperCase(),
    country: $('#country').value.trim(),
    cities: dests.map(c => ({ city: c.city, iata: c.iata })),
    adults: parseInt($('#adults').value) || 1,
    child_ages: kidAges(),
    families: fams,
    dep_start: $('#depStart').value,
    dep_span: parseInt($('#depSpan').value) || 2,
    ret_start: $('#retStart').value,
    ret_span: parseInt($('#retSpan').value) || 2,
    nonstop_threshold: parseFloat($('#thresh').value) || 25,
  };
  // Clear any stale export state: a new search invalidates the previous result.
  // LAST_PAYLOAD/export buttons are only re-armed on the `done` event below, so
  // if this search 400s/aborts/throws the buttons stay disabled.
  LAST_PAYLOAD = null;
  $('#exportPdf').disabled = true;
  $('#exportCsv').disabled = true;
  $('#copyLink').disabled = true;
  $('#run').disabled = true;
  $('#runHint').textContent = 'Searching ' + dests.length + ' cities…';
  $('#prog').style.width = '5%';
  $('#rec').style.display = 'none';
  $('#summary').innerHTML = '';
  $('#grids').innerHTML = '';

  let cellsDone = 0, total = 0;
  const bestByCityIdx = {};  // dest_index -> best cell so far
  let metaInfo = null;        // captured meta line (providers, pax, etc.)
  let sawNoData = false;      // true if any cell returned no fares
  let succeeded = false;      // true once the stream finished cleanly

  try {
    const response = await fetch('/api/search/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    // Non-ok or JSON error (400)
    if (!response.ok) {
      let msg = 'Search failed (' + response.status + ')';
      try { const e = await response.json(); if (e.error) msg = e.error; } catch (_) {}
      alert(msg);
      return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    function handleLine(line) {
      line = line.trim();
      if (!line) return;
      let evt;
      try { evt = JSON.parse(line); } catch (_) { return; }

      if (evt.type === 'meta') {
        total = evt.total_cells;
        metaInfo = evt;
        // Build skeleton: summary cards + grid tables
        const sum = $('#summary');
        sum.innerHTML = '';
        const g = $('#grids');
        g.innerHTML = '';
        evt.results.forEach((r, di) => {
          // Summary card skeleton
          const card = document.createElement('div');
          card.className = 'card';
          card.id = 'card-' + di;
          card.innerHTML = '<div class="city">' + escapeHtml(r.city) + ' <small>(' + escapeHtml(r.iata) + ')</small></div>' +
            '<div class="price" id="card-price-' + di + '">…</div>' +
            '<div class="meta" id="card-meta-' + di + '">searching…</div>' +
            '<div class="meta">group ×' + fams + ': <span id="card-group-' + di + '">…</span></div>' +
            '<button class="watch" id="card-watch-' + di + '" style="display:none">☆ Watch</button>';
          sum.appendChild(card);

          // Grid table skeleton
          const blk = document.createElement('div');
          blk.className = 'cityblock';
          blk.id = 'blk-' + di;
          let html = '<h2>' + escapeHtml(r.city) + ' <small>(' + escapeHtml(r.iata) + ')</small></h2>' +
            '<table id="tbl-' + di + '"><thead><tr><th>dep \\ ret</th>' +
            evt.ret_dates.map(d => '<th>' + escapeHtml(fmtDate(d)) + '</th>').join('') +
            '</tr></thead><tbody>';
          evt.dep_dates.forEach(dep => {
            html += '<tr><td class="rowh">' + escapeHtml(fmtDate(dep)) + '</td>';
            evt.ret_dates.forEach(ret => {
              html += '<td class="loading" data-k="' + escapeHtml(dep + '|' + ret) + '">…</td>';
            });
            html += '</tr>';
          });
          html += '</tbody></table>';
          blk.innerHTML = html;
          g.appendChild(blk);
        });
        $('#prog').style.width = '10%';

      } else if (evt.type === 'cell') {
        const di = evt.dest_index;
        if (evt.cheapest_cad == null) sawNoData = true;
        const key = evt.dep + '|' + evt.ret;
        const tbl = document.getElementById('tbl-' + di);
        if (tbl) {
          const td = tbl.querySelector('td[data-k="' + key + '"]');
          if (td) {
            td.outerHTML = _cellHtml(evt, thr);
          }
        }
        // Update best tracking for summary card. Cells arrive in as_completed
        // order, so we apply the SAME deterministic tie-break the backend uses
        // (lowest chosen_cad, then earliest position by dep index, then ret
        // index) so the card + highlight match /api/search exactly on ties.
        if (evt.chosen_cad != null) {
          const depIdx = metaInfo ? metaInfo.dep_dates.indexOf(evt.dep) : -1;
          const retIdx = metaInfo ? metaInfo.ret_dates.indexOf(evt.ret) : -1;
          const prev = bestByCityIdx[di];
          const isBetter = !prev || evt.chosen_cad < prev.chosen_cad ||
            (evt.chosen_cad === prev.chosen_cad &&
              (depIdx < prev.depIdx || (depIdx === prev.depIdx && retIdx < prev.retIdx)));
          if (isBetter) {
            bestByCityIdx[di] = Object.assign({ depIdx: depIdx, retIdx: retIdx }, evt);
            const priceEl = document.getElementById('card-price-' + di);
            const metaEl = document.getElementById('card-meta-' + di);
            const groupEl = document.getElementById('card-group-' + di);
            if (priceEl) priceEl.textContent = money(evt.chosen_cad);
            if (metaEl) metaEl.textContent = fmtDate(evt.dep) + ' → ' + fmtDate(evt.ret) + ' · ' + (evt.chosen_stops === 0 ? 'nonstop' : evt.chosen_stops + ' stop(s)') + (evt.chosen_duration_min != null ? ' · ' + fmtDuration(evt.chosen_duration_min) : '');
            if (groupEl) groupEl.textContent = money(evt.chosen_cad * fams);
          }
        }
        cellsDone++;
        const pct = total > 0 ? 10 + (cellsDone / total) * 85 : 10;
        $('#prog').style.width = pct + '%';

      } else if (evt.type === 'recommendation') {
        const rec = $('#rec');
        rec.style.display = 'block';
        rec.innerHTML = '<h3>Best-value pick</h3>' + mdInline(evt.text || '');
        // Apply best-cell highlights to the deterministic best cell (matches
        // backend tie-break). Clear any prior .best for this city first so the
        // outline lands on the chosen cell, not an earlier-arriving tie.
        Object.entries(bestByCityIdx).forEach(([di, b]) => {
          const tbl = document.getElementById('tbl-' + di);
          if (tbl && b) {
            tbl.querySelectorAll('td.best').forEach(td => td.classList.remove('best'));
            const td = tbl.querySelector('td[data-k="' + b.dep + '|' + b.ret + '"]');
            if (td) td.classList.add('best');
          }
        });

      } else if (evt.type === 'done') {
        finalizeStream();
        wireWatchButtons(metaInfo, bestByCityIdx);
        succeeded = true;
        $('#prog').style.width = '100%';
        setTimeout(() => { $('#prog').style.width = '0%'; }, 600);
        // Search completed cleanly: arm the export buttons with this payload.
        LAST_PAYLOAD = payload;
        $('#exportPdf').disabled = false;
        $('#exportCsv').disabled = false;
        // Write share state to the URL hash from the immutable snapshot captured
        // at search start — never re-read the live DOM/CITIES here, or an edit
        // made mid-stream would encode a search different from the results shown.
        history.replaceState(null, '', '#s=' + encodeURIComponent(JSON.stringify(SHARE_SNAPSHOT)));
        $('#copyLink').disabled = false;
      }
    }

    function finalizeStream() {
      // Finalize every city card that never got a "best" cell: match the old
      // render() behavior for no-fare cities (— / no fares / —).
      (metaInfo ? metaInfo.results : []).forEach((r, di) => {
        if (bestByCityIdx[di]) return;
        const priceEl = document.getElementById('card-price-' + di);
        const metaEl = document.getElementById('card-meta-' + di);
        const groupEl = document.getElementById('card-group-' + di);
        if (priceEl) priceEl.textContent = '—';
        if (metaEl) metaEl.textContent = 'no fares';
        if (groupEl) groupEl.textContent = '—';
      });
      // Finalize any grid cell still on the "…" placeholder to the n/a style
      // the old render() used for null cells.
      document.querySelectorAll('#grids td.loading').forEach(td => {
        td.className = 'err';
        td.textContent = 'n/a';
      });
      // Restore footer provenance (replicates the old render() #foot logic).
      if (metaInfo) {
        const prov = (metaInfo.providers || []);
        const pax = (metaInfo.adults || 0) + (metaInfo.child_ages || []).length;
        $('#foot').innerHTML = (prov.length
            ? 'Live flight data via <b>' + escapeHtml(prov.join(', ')) + '</b>. The model analyzes these real fares — it does not generate prices. '
            : '<span class="estimate-flag">no flight API</span> Set TRAVELPAYOUTS_TOKEN (or Amadeus keys) so the app can fetch real prices. ') +
          (sawNoData ? '<span class="warn">Some cells returned no fares from the API. </span>' : '') +
          'Per family of ' + pax + '. Prices CAD · click any price to open the booking.';
      }
    }

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n');
      buf = parts.pop();  // last partial line stays in buffer
      for (const raw of parts) {
        handleLine(raw);
      }
    }
    // Flush any remaining buffered content after the stream ends
    if (buf.trim()) {
      handleLine(buf);
    }
  } catch (e) {
    alert('Search failed: ' + e);
  } finally {
    $('#run').disabled = false;
    $('#runHint').textContent = '';
    // Reset the progress bar on ALL exit paths (success, error, or a 400
    // validation failure that took the early return). On success the `done`
    // handler runs its own 100%→0% fade, so only reset here when the stream
    // did NOT finish cleanly — otherwise we'd clobber that animation.
    if (!succeeded) $('#prog').style.width = '0%';
  }
};

function render(data){
  const thr = 1 + (parseFloat($('#thresh').value)||25)/100;
  const fams = data.families||1;
  // recommendation
  const rec=$('#rec'); rec.style.display='block';
  rec.innerHTML='<h3>Best-value pick</h3>'+mdInline(data.recommendation||'');
  // summary cards
  const sum=$('#summary'); sum.innerHTML='';
  data.results.forEach(r=>{
    const b=r.best;
    const card=document.createElement('div'); card.className='card';
    card.innerHTML = `<div class="city">${escapeHtml(r.city)} <small>(${escapeHtml(r.iata)})</small></div>`+
      `<div class="price">${b?money(b.chosen_cad):'—'}</div>`+
      `<div class="meta">${b?escapeHtml(fmtDate(b.dep))+' → '+escapeHtml(fmtDate(b.ret))+' · '+(b.chosen_stops===0?'nonstop':b.chosen_stops+' stop(s)')+(b.chosen_duration_min!=null?' · '+fmtDuration(b.chosen_duration_min):''):'no fares'}</div>`+
      `<div class="meta">group ×${fams}: ${b?money(b.chosen_cad*fams):'—'}</div>`;
    sum.appendChild(card);
  });
  // grids
  const g=$('#grids'); g.innerHTML='';
  const rets = data.ret_dates;
  data.results.forEach(r=>{
    const blk=document.createElement('div'); blk.className='cityblock';
    let html=`<h2>${escapeHtml(r.city)} <small>(${escapeHtml(r.iata)})</small></h2><table><thead><tr><th>dep \\ ret</th>`+
      rets.map(d=>`<th>${escapeHtml(fmtDate(d))}</th>`).join('')+'</tr></thead><tbody>';
    r.grid.forEach(row=>{
      html+=`<tr><td class="rowh">${escapeHtml(fmtDate(row[0].dep))}</td>`;
      row.forEach(c=>{ html += _cellHtml(c, thr); });
      html+='</tr>';
    });
    html+='</tbody></table>';
    blk.innerHTML=html; g.appendChild(blk);
    if(r.best){ const td=blk.querySelector(`td[data-k="${r.best.dep}|${r.best.ret}"]`); if(td) td.classList.add('best'); }
  });
  const prov = (data.providers||[]);
  const noData = data.results.some(r=>r.grid.some(row=>row.some(c=>c.source==='no-data')));
  $('#foot').innerHTML = (prov.length
      ? 'Live flight data via <b>'+escapeHtml(prov.join(', '))+'</b>. The model analyzes these real fares — it does not generate prices. '
      : '<span class="estimate-flag">no flight API</span> Set TRAVELPAYOUTS_TOKEN (or Amadeus keys) so the app can fetch real prices. ')+
    (noData?'<span class="warn">Some cells returned no fares from the API. </span>':'')+
    'Per family of '+(data.adults+data.child_ages.length)+'. Prices CAD · click any price to open the booking.';
}

async function triggerExport(endpoint, defaultFilename, btnEl, loadingLabel) {
  if (!LAST_PAYLOAD) return;  // defensive: should never happen (button is disabled)
  const origText = btnEl.textContent;
  btnEl.disabled = true;
  btnEl.textContent = loadingLabel;
  try {
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(LAST_PAYLOAD),
    });
    if (!resp.ok) {
      let msg = 'Export failed (' + resp.status + ')';
      try { const e = await resp.json(); if (e.error) msg = e.error; } catch (_) {}
      alert(msg);
      return;
    }
    const blob = await resp.blob();
    // Try to extract filename from Content-Disposition
    const cd = resp.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename="([^"]+)"/);
    const filename = match ? match[1] : defaultFilename;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Export failed: ' + e);
  } finally {
    btnEl.textContent = origText;
    // Only re-enable if a newer search hasn't invalidated the payload while this
    // export was in flight. If LAST_PAYLOAD was cleared by a new search, the
    // button must stay disabled (clicking it would silently no-op).
    btnEl.disabled = !LAST_PAYLOAD;
  }
}

$('#exportPdf').onclick = () => triggerExport('/api/export/pdf', 'whenever-matrix.pdf', $('#exportPdf'), 'Preparing PDF…');
$('#exportCsv').onclick = () => triggerExport('/api/export/csv', 'whenever-matrix.csv', $('#exportCsv'), 'Preparing CSV…');

$('#copyLink').onclick = () => {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = $('#copyLink');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
};

// --------------------------- price watches ------------------------
// markWatched: flip a Watch button into its disabled "Watching ✓" state.
function markWatched(btn) {
  btn.classList.add('watched');
  btn.disabled = true;
  btn.textContent = 'Watching ✓';
}

// resetWatchButton: undo markWatched, restoring the enabled "☆ Watch" state so
// the same trip can be re-watched after its saved watch is removed.
function resetWatchButton(btn) {
  btn.classList.remove('watched');
  btn.disabled = false;
  btn.textContent = '☆ Watch';
}

// tripKey: build the FULL trip key the backend dedup uses, so card buttons and
// saved watches can be compared on the exact same identity — origin, dest_iata,
// dep_date, ret_date, adults, children COUNT, and sorted child_ages. Matching on
// only dest+dates would wrongly re-enable a card when an UNRELATED watch (same
// dest+dates but different origin or passenger party) is removed. (codex review)
function tripKey(t) {
  const origin = String(t.origin || '').trim().toUpperCase();
  const iata = String(t.dest_iata || '').trim().toUpperCase();
  const adults = Number(t.adults) || 0;
  const ages = (Array.isArray(t.child_ages) ? t.child_ages : [])
    .map(a => Number(a) || 0).sort((a, b) => a - b);
  // The card POSTs only child_ages (no separate count), so its children COUNT
  // equals ages.length — matching how the backend reconciles a card watch.
  const children = (t.children == null) ? ages.length : (Number(t.children) || 0);
  return JSON.stringify([
    origin, iata, t.dep_date || '', t.ret_date || '', adults, children, ages,
  ]);
}

// resetCardWatchForTrip: after a watch is removed, find any visible card Watch
// button whose stored FULL trip key MATCHES the removed watch and reset it to the
// enabled "☆ Watch" state. Buttons whose key differs (e.g. same dest+dates but a
// different origin/party) are left as-is. No-op when no matching card is shown.
function resetCardWatchForTrip(w) {
  if (!w) return;
  const removedKey = tripKey(w);
  document.querySelectorAll('button.watch').forEach(btn => {
    if (btn.dataset.tripKey === removedKey) {
      resetWatchButton(btn);
    }
  });
}

// wireWatchButtons: after a search completes, reveal + wire a Watch button on
// every city card that has a priced best cell. Clicking POSTs that city's best
// trip to /api/watch (the server derives the baseline from a real fare lookup)
// and flips the button to a watched state. Cities without a best stay without a
// button.
function wireWatchButtons(metaInfo, bestByCityIdx) {
  if (!metaInfo) return;
  metaInfo.results.forEach((r, di) => {
    const btn = document.getElementById('card-watch-' + di);
    if (!btn) return;
    const best = bestByCityIdx[di];
    // Only cities with a priced best can be watched. The scheduler compares the
    // baseline against cheapest_cad, so a watch only makes sense (and the
    // baseline only seeds correctly) when cheapest_cad is present.
    if (!best || best.cheapest_cad == null) return;
    btn.style.display = '';
    const body = {
      origin: (metaInfo.origin || '').toUpperCase(),
      dest_iata: r.iata,
      dest_city: r.city,
      dep_date: best.dep,
      ret_date: best.ret,
      adults: metaInfo.adults,
      child_ages: metaInfo.child_ages || [],
      threshold_pct: metaInfo.nonstop_threshold,
    };
    // Record the FULL trip key (origin + dest + dates + party) so a later watch
    // removal only re-enables this card when the REMOVED watch is the same trip —
    // not an unrelated watch that merely shares dest+dates. (codex review)
    btn.dataset.tripKey = tripKey(body);
    // No last_price/last_source in body: the server re-derives the baseline from
    // a real get_fare lookup (REAL-DATA-ONLY guardrail) and ignores any
    // client-supplied price, so we don't send one. (codex review)
    btn.onclick = async () => {
      btn.disabled = true;
      try {
        const resp = await fetch('/api/watch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!resp.ok) {
          let msg = 'Could not save watch (' + resp.status + ')';
          try { const e = await resp.json(); if (e.error) msg = e.error; } catch (_) {}
          alert(msg);
          btn.disabled = false;
          return;
        }
        markWatched(btn);
        loadWatches();  // refresh the Watched trips list
      } catch (e) {
        alert('Could not save watch: ' + e);
        btn.disabled = false;
      }
    };
  });
}

// paxLabel: human passenger summary for a watch, using the stored `children`
// COUNT (not just child_ages, which may be empty when ages were unknown) so a
// family watch (children=2) is visibly distinct from an adults-only one. (codex)
function paxLabel(w) {
  const adults = Number(w.adults) || 0;
  const children = Number(w.children) || 0;
  const parts = [adults + (adults === 1 ? ' adult' : ' adults')];
  if (children) parts.push(children + (children === 1 ? ' child' : ' children'));
  return parts.join(', ');
}

// loadWatches: fetch saved watches and render the "Watched trips" list, each
// with a ✕ remove button that DELETEs the watch. All values are escapeHtml'd.
async function loadWatches() {
  const box = $('#watchedList');
  if (!box) return;
  let watches = [];
  try {
    const r = await fetch('/api/watch');
    if (!r.ok) return;
    watches = (await r.json()).watches || [];
  } catch (e) { return; }
  box.innerHTML = '';
  if (!watches.length) {
    const empty = document.createElement('div');
    empty.className = 'watched-empty';
    empty.textContent = 'No watched trips yet. Run a search and tap ☆ Watch on a city.';
    box.appendChild(empty);
    return;
  }
  watches.forEach(w => {
    const item = document.createElement('div');
    item.className = 'watched-item';
    const price = (w.last_price != null) ? money(w.last_price) : '—';
    item.innerHTML =
      '<span class="trip">' + escapeHtml(w.origin) + ' → ' +
        escapeHtml(w.dest_city || w.dest_iata) + ' <small>(' + escapeHtml(w.dest_iata) + ')</small> · ' +
        escapeHtml(w.dep_date) + ' → ' + escapeHtml(w.ret_date) + ' · ' +
        escapeHtml(paxLabel(w)) + '</span>' +
      '<span class="wprice">' + price + '</span>' +
      '<button class="rm sec" data-id="' + escapeHtml(w.id) + '">✕</button>';
    const rm = item.querySelector('button.rm');
    rm.onclick = async () => {
      rm.disabled = true;
      try {
        const resp = await fetch('/api/watch/' + encodeURIComponent(w.id), { method: 'DELETE' });
        if (!resp.ok) { rm.disabled = false; return; }
        // Re-enable any matching card Watch button so the trip is re-watchable.
        resetCardWatchForTrip(w);  // (codex review)
        loadWatches();
      } catch (e) { rm.disabled = false; }
    };
    box.appendChild(item);
  });
}

// Schema helpers for restoreFromHash: defense-in-depth coercion of a
// URL-controlled share payload. Each returns a sanitized value or undefined
// when the input is malformed; callers skip undefined fields.
function _vStr(v, max) {
  if (v == null) return undefined;
  const s = String(v);
  return s.length > max ? s.slice(0, max) : s;
}
function _vNum(v, lo, hi) {
  const n = Number(v);
  if (!Number.isFinite(n)) return undefined;
  return Math.min(hi, Math.max(lo, n));
}
function isValidIsoDate(s) {
  // Strict ISO YYYY-MM-DD validation done entirely in UTC so it never depends
  // on the browser's local timezone. `new Date('YYYY-MM-DDT00:00:00')` parses as
  // LOCAL midnight, and .toISOString() then shifts it to the previous UTC day in
  // UTC+ zones (Tokyo/Berlin), which would wrongly reject valid shared dates.
  if (typeof s !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return false;
  const [y, m, d] = s.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  return dt.getUTCFullYear() === y && dt.getUTCMonth() === m - 1 && dt.getUTCDate() === d;
}
function _vDate(v) {
  // Reject impossible months/days (e.g. 2026-13-40) without any local→UTC shift.
  return isValidIsoDate(v) ? v : undefined;
}
function _vIata(v) {
  if (typeof v !== 'string' || !/^[A-Za-z]{3}$/.test(v)) return undefined;
  return v.toUpperCase();
}

function restoreFromHash() {
  const hash = location.hash;
  if (!hash.startsWith('#s=')) return;
  let obj;
  try {
